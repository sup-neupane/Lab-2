<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock & Countdown Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Digital Clock & Countdown Timer</h1>

    <section class="clock-section">
      <h2>Current Time</h2>
      <div id="clock" class="clock-display">--:--:--</div>
    </section>

    <section class="timer-section">
      <h2>Countdown Timer</h2>
      <div class="timer-inputs">
        <input id="hours" type="number" min="0" placeholder="HH" />
        <input id="minutes" type="number" min="0" max="59" placeholder="MM" />
        <input id="seconds" type="number" min="0" max="59" placeholder="SS" />
      </div>
      <div class="timer-controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="resetBtn" disabled>Reset</button>
      </div>
      <div id="timerDisplay" class="timer-display">00:00:00</div>
      <div id="alert" class="alert hidden"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
