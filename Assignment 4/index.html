<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-container">
    <h1>Number Guessing Game</h1>
    <p>Guess a number between 1 and 100.</p>

    <div class="game-box">
      <input id="guessInput" type="number" min="1" max="100" placeholder="Enter your guess" />
      <button id="guessBtn">Guess</button>
      <button id="newGameBtn">New Game</button>
    </div>

    <p id="feedback" class="feedback">Start guessing...</p>
    <p>Score: <span id="score">100</span></p>
    <p>Highscore: <span id="highscore">0</span></p>

    <div class="history-area">
      <h3>Attempts</h3>
      <ul id="attemptList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
